services:
  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - INGEST_SERVICE_URL=http://ingest-service:8001
      - ML_ORCHESTRATOR_URL=http://ml-orchestrator:8002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      ingest-service:
        condition: service_healthy
      ml-orchestrator:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - truthlens-net

  ingest-service:
    build: ./services/ingest-service
    ports:
      - "8001:8001"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - truthlens-net

  ml-orchestrator:
    build: ./services/ml-specialists
    ports:
      - "8002:8002"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - truthlens-net

networks:
  truthlens-net:
    driver: bridge
