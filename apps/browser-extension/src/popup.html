<!DOCTYPE html>
<html>

<head>

      background: #0b0b0f;
      color: white;
      font-family: sans-serif;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }


    .btn {
      background: #00C897;
      color: black;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="../icons/icon48.png" style="width: 30px; height: 30px; object-fit: contain;" />
    <b style="font-size: 18px;">VERIDARA Guardian</b>
  </div>
  <p style="font-size: 13px; color: #aaa;">Right-click any image or video on the web to verify its authenticity
    instantly.</p>
  <button class="btn" onclick="window.open('http://localhost:5173')">Open Dashboard</button>
  <div class="status">v1.0.0 — Secured by AI</div>
</body>

</html>
